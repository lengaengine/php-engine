name: Verify Release Version

on:
  push:
    tags:
      - '*'
  release:
    types:
      - published
      - prereleased

permissions:
  contents: read

jobs:
  verify-release-version:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Verify VERSION matches tag
        shell: bash
        run: |
          set -euo pipefail

          VERSION_TAG="${RELEASE_TAG#v}"

          if [[ ! "$VERSION_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$RELEASE_TAG' is not a semver release tag. Skipping."
            exit 0
          fi

          FILE_VERSION=$(tr -d '\r\n' < VERSION)

          if [[ "$FILE_VERSION" != "$VERSION_TAG" ]]; then
            echo "VERSION mismatch: tag is '$VERSION_TAG' but VERSION contains '$FILE_VERSION'." >&2
            exit 1
          fi
